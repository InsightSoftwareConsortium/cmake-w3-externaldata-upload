[workspace]
authors = ["Matthew McCormick <matt@mmmccormick.com>"]
channels = ["conda-forge"]
name = "cmake-w3-externaldata-upload"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
pnpm-install = { cmd="pnpm install", description="Install JavaScript dependencies", outputs=["node_modules/.pnpm-workspace-state.json"] }
worker-install = { cmd="cd worker && pnpm install", description="Install Worker dependencies", depends-on=["pnpm-install"] }
build = { cmd="pnpm build", description="Build frontend JavaScript code", depends-on=["pnpm-install"], outputs=["dist"] }
dev = { cmd="pnpm dev", description="Start frontend dev server and Worker", depends-on=["pnpm-install", "worker-install"] }
preview = { cmd="pnpm preview", description="Preview the production web page", depends-on=["build"] }
worker-deploy = { cmd="pnpm worker:deploy", description="Deploy the Cloudflare Worker", depends-on=["worker-install"] }
worker-db-init = { cmd="pnpm worker:db:init", description="Initialize local D1 database", depends-on=["worker-install"] }
worker-db-init-remote = { cmd="pnpm worker:db:init:remote", description="Initialize remote D1 database", depends-on=["worker-install"] }

[dependencies]
nodejs = ">=20.0.0,<23"
pnpm = ">=10.10.0,<11"
